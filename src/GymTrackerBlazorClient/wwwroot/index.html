<!DOCTYPE html>
<html class="fullHeight">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>GymTrackerBlazorClient</title>
    <base href="/" />
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet" />
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
    <link href="manifest.json" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />

    <link href="css/app.css" rel="stylesheet" />
    <link href="GymTracker.BlazorClient.styles.css" rel="stylesheet" />
    <script>
        window.__isMobile = window.innerWidth <= 768;
        window.__isDarkMode = window.matchMedia('(prefers-color-scheme: dark)').matches;
    </script>
    <script type="module">
        // Pre-import IndexedDB module and open DB connection during WASM boot
        import('./_content/GymTracker.LocalStorage/indexedDb.js')
            .then(m => m.get('Meta', '__warmup__').catch(() => {}));
    </script>
</head>

<body class="fullHeight">
    <div id="app" style="height:100%;">
        <div style="background-color: black;width:100%;height:100%">
            loading...
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
        <script>navigator.serviceWorker.register('service-worker.js');</script>
</body>

</html>
